{% extends "base.html" %}
{% block title %}Logs — Auto Youtuber{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-terminal"></i> Live Logs</h4>
    <div class="d-flex gap-2 align-items-center">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="auto-scroll" checked>
            <label class="form-check-label" for="auto-scroll">Auto-scroll</label>
        </div>
        <button class="btn btn-sm btn-outline-secondary" id="clear-btn"><i class="bi bi-trash"></i> Clear</button>
    </div>
</div>

<div class="log-area" id="log-area">
    {% for line in log_lines %}
    <p>{{ line }}</p>
    {% endfor %}
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const logArea = document.getElementById('log-area');
const autoScroll = document.getElementById('auto-scroll');
let lastCount = {{ log_lines | length }};

function pollLogs() {
    fetch('/api/logs').then(r => r.json()).then(data => {
        if (data.lines.length !== lastCount) {
            logArea.innerHTML = data.lines.map(l => '<p>' + l.replace(/</g, '&lt;') + '</p>').join('');
            lastCount = data.lines.length;
            if (autoScroll.checked) {
                logArea.scrollTop = logArea.scrollHeight;
            }
        }
    });
}
setInterval(pollLogs, 2000);

document.getElementById('clear-btn').addEventListener('click', () => {
    fetch('/api/logs/clear', { method: 'POST' }).then(() => {
        logArea.innerHTML = '';
        lastCount = 0;
    });
});

// Initial scroll to bottom
logArea.scrollTop = logArea.scrollHeight;
</script>
{% endblock %}
